<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Prevent libraries from trying to polyfill fetch if it's read-only
      (function() {
        try {
          var originalFetch = window.fetch;
          if (originalFetch && !Object.getOwnPropertyDescriptor(window, 'fetch')?.writable) {
            Object.defineProperty(window, 'fetch', {
              get: function() { return originalFetch; },
              set: function() { console.warn('Blocked attempt to overwrite read-only fetch'); },
              configurable: true
            });
          }
        } catch (e) {}
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
